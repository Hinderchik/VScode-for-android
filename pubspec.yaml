name: vscode_android
description: Mobile VSCode for Android — Monaco Editor, Clim AI, Plugin Marketplace, Tor proxy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  dio: ^5.7.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/editor.html
    - assets/plugin-docs.html
    - assets/monaco/vs/loader.js
    - assets/monaco/vs/editor/editor.main.js
    - assets/monaco/vs/editor/editor.main.css
    - assets/monaco/vs/editor/editor.main.nls.js
    - assets/monaco/vs/base/worker/workerMain.js
